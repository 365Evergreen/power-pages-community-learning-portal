id: escalate-to-human
name: Escalate to Human
description: >
  Triggered when the agent cannot answer a question or the user explicitly requests
  to speak with a person.
triggerPhrases:
  - speak to a person
  - talk to someone
  - human agent
  - real person
  - contact support
  - I need help
  - this isn't helping
nodes:
  - id: escalate
    type: message
    content: >
      I'm sorry I wasn't able to fully help with that.
      A member of our team would be happy to assist you.

      📧 **Email:** hello@communitylearninghub.org
      We aim to respond within 2 business days.

      Is there anything else I can try to help with before you go?
